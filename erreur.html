<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur - Analyse Ventes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <div class="alert alert-danger">
                    <h1><i class="fas fa-exclamation-triangle"></i></h1>
                    <h2>Erreur lors du traitement</h2>
                    <p class="lead">{{ message }}</p>
                    <hr>
                    <p>
                        <strong>Vérifiez :</strong><br>
                        - Le fichier <code>ventes.csv</code> existe<br>
                        - Il contient les colonnes : ID, Prix, Quantite, Remise<br>
                        - Toutes les valeurs sont numériques et positives
                    </p>
                    <a href="/" class="btn btn-primary btn-lg">
                        <i class="fas fa-home"></i> Retour au Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
